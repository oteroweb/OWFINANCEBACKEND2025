name: Deploy Backend

on:
  push:
    branches: [main, stage, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno (prod|stage|dev)'
        required: true
        default: 'stage'
        type: choice
        options: [prod, stage, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || (github.ref == 'refs/heads/stage' && 'stage') || 'dev' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_mysql, bcmath, gd, zip, curl, xml
          coverage: none

      - name: Instalar dependencias Composer
        run: |
          cp .env.example .env
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Añadir known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy en servidor
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          DEPLOY_BACKEND_DIR: ${{ secrets.DEPLOY_BACKEND_DIR }}
          DEPLOY_SITE_URL: ${{ secrets.DEPLOY_SITE_URL }}
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  DEPLOY BACKEND (${DEPLOY_ENV})"
          echo "  Servidor: ${DEPLOY_USER}@${DEPLOY_HOST}"
          echo "  Branch:   ${DEPLOY_BRANCH}"
          echo "════════════════════════════════════════════════════════"

          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" /bin/bash << REMOTE
            set -e
            cd "\$HOME/${DEPLOY_BACKEND_DIR}"

            echo "[1/5] git pull..."
            git pull origin "${DEPLOY_BRANCH}"

            echo "[2/5] composer install..."
            composer install --no-dev --prefer-dist --no-interaction --quiet 2>/dev/null || true

            echo "[3/5] migraciones..."
            php artisan migrate --force

            echo "[4/5] caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache 2>/dev/null || true

            echo "[5/5] limpiando cache..."
            php artisan cache:clear

            echo ""
            echo "Deploy OK → \$(git log --oneline -1)"
          REMOTE
