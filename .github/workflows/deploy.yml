name: Deploy Backend → appfinanzas.blockshift.website

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_mysql, bcmath, gd, zip, curl, xml
          coverage: none

      - name: Instalar dependencias Composer
        run: |
          cp .env.example .env
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Añadir known_hosts
        run: ssh-keyscan -H 178.156.160.70 >> ~/.ssh/known_hosts

      - name: Deploy en servidor
        run: |
          ssh appfinan1@178.156.160.70 /bin/bash << 'REMOTE'
            set -e
            cd ~/OWFINANCEBACKEND2025

            echo "[1/5] git pull..."
            git pull origin main

            echo "[2/5] composer install..."
            composer install --no-dev --prefer-dist --no-interaction --quiet 2>/dev/null || true

            echo "[3/5] migraciones..."
            php artisan migrate --force

            echo "[4/5] caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache 2>/dev/null || true

            echo "[5/5] limpiando cache..."
            php artisan cache:clear

            echo ""
            echo "Deploy OK → $(git log --oneline -1)"
          REMOTE
